<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | MotoTaxi</title>
    <link rel="stylesheet" href="css/inicio_de seción.css">
</head>
<body class="flex-center">

   <div class="card">
    <h2>Iniciar Sesión</h2>
    
    <input type="tel" id="tel" placeholder="Teléfono" 
            oninput="if(this.value.length > 10) this.value = this.value.slice(0, 10);">
    
    <input type="password" id="pass" placeholder="Contraseña">

    <button type="button" id="btnEntrar">ENTRAR</button>
    
    <div class="separator">
        <a href="registro.html" class="link-reg">¿No tienes cuenta? Regístrate</a>
    </div>
  </div>

   <script type="module">
    import { db, doc, getDoc, setDoc } from './js/config.js';

    const loginUsuario = async (e) => {
        if(e) e.preventDefault(); 

        const tel = document.getElementById('tel').value;
        const pass = document.getElementById('pass').value;

        if (tel.length !== 10) return alert("❌ El teléfono debe tener 10 dígitos.");
        if (!pass) return alert("❌ Escribe tu contraseña.");

        try {
            const docRef = doc(db, "usuarios", tel);
            const snap = await getDoc(docRef);

            if (snap.exists()) {
                const datos = snap.data();
                
                if (datos.pass === pass) {
                    const tipo = datos.tipo;
                    const dispositivoID = navigator.userAgent + navigator.platform;

                    if (tipo === 'admin') {
                        if (datos.deviceId && datos.deviceId !== dispositivoID) {
                            return alert("❌ ACCESO DENEGADO: Este dispositivo no está autorizado.");
                        }
                        if (!datos.deviceId) {
                            await setDoc(docRef, { deviceId: dispositivoID }, { merge: true });
                        }
                    }

                    localStorage.setItem('usuarioActivo', tel);
                    localStorage.setItem('nombreActivo', datos.nombre);
                    localStorage.setItem('tipoUsuario', tipo);
                    
                    if (tipo === 'admin') {
                        window.location.replace("menu_admin.html");
                    } else if (tipo === 'conductor') {
                        window.location.replace("menu_chofer.html");
                    } else {
                        window.location.replace("Menu_Principal.html");
                    }

                } else {
                    alert("❌ Contraseña incorrecta.");
                }
            } else {
                alert("❌ Este número no está registrado.");
            }
        } catch (error) {
            console.error(error);
            alert("❌ Error de conexión.");
        }
    };

    document.getElementById('btnEntrar').addEventListener('click', loginUsuario);

    document.getElementById('pass').addEventListener('keydown', (e) => {
        if(e.key === 'Enter') loginUsuario(e);
    });
   </script>
</body>
</html>
