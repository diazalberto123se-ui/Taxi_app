<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Control | Admin</title>
    <style>
        body { background: #0b090a; color: white; font-family: sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-stats { background: #161a1d; padding: 20px; border-radius: 20px; border-left: 5px solid #ffb703; margin-bottom: 15px; }
        .label { color: #888; font-size: 12px; text-transform: uppercase; }
        .valor { font-size: 24px; font-weight: bold; color: #ffb703; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-accion { background: #333; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #444; cursor: pointer; text-decoration: none; color: white; font-size: 14px; }
        .btn-cerrar { color: #d90429; font-size: 14px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Panel Administrativo</h2>
        <a href="#" onclick="cerrarSesion()" class="btn-cerrar">Salir</a>
    </div>

    <div class="card-stats">
        <div class="label">Bienvenido Jefe:</div>
        <div id="nombre-admin" class="valor">Cargando...</div>
    </div>

    <div class="grid">
        <div class="card-stats">
            <div class="label">Ganancia Hoy</div>
            <div class="valor">$0.00</div>
        </div>
        <div class="card-stats">
            <div class="label">Fondo Rifas</div>
            <div class="valor">$0.00</div>
        </div>
    </div>

    <h3 style="margin-top: 30px;">Gestión de Unidad</h3>
    <div class="grid">
        <div class="btn-accion">Lista de Choferes</div>
        <div class="btn-accion">Corte de Caja</div>
        <div class="btn-accion">Editar Precios</div>
        <div class="btn-accion">Ver Mapa</div>
    </div>

    <script>
        // Mostrar el nombre del Admin
        document.getElementById('nombre-admin').innerText = localStorage.getItem('nombreActivo') || "Admin";

        // Seguridad básica: Si no es admin, sacarlo
        if(localStorage.getItem('tipoUsuario') !== 'admin') {
            window.location.replace("index.html");
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.replace("index.html");
        }
    </script>
</body>
</html>
