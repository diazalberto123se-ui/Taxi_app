<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | MotoTaxi</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>
    <div class="card">
        <h2 style="text-align: center; margin: 0 0 20px 0;">Nueva Cuenta</h2>
        
        <img id="preview" class="foto-perfil" src="https://via.placeholder.com/90" onclick="document.getElementById('foto').click()">
        <input type="file" id="foto" accept="image/*" style="display:none" onchange="previewFoto(event)">
        <p class="instruccion-foto">Toca el círculo para subir foto</p>

        <label>TIPO DE USUARIO</label>
        <select id="tipo" onchange="checkConductor()">
            <option value="pasajero">Pasajero</option>
            <option value="conductor">Conductor</option>
        </select>

        <input type="text" id="nombre" placeholder="Nombre completo">
        
        <input type="number" id="tel" placeholder="Teléfono (10 dígitos)" 
               oninput="if(this.value.length > 10) this.value = this.value.slice(0, 10);">
        
        <div id="sectionConductor" style="display:none;">
            <label>DATOS DE CONDUCTOR</label>
            <select id="sindicato">
                <option value="Delfin">Sindicato Delfín</option>
                <option value="Tiburon">Sindicato Tiburón</option>
            </select>
            <input type="text" id="unidad" placeholder="Núm. de Unidad">
        </div>

        <input type="password" id="pass" placeholder="Crea una contraseña">
        
        <button id="btnRegistrar">FINALIZAR Y ENTRAR</button>
    </div>

    <script type="module">
        import { db, doc, setDoc, getDoc } from 'config.js';

        window.previewFoto = (e) => {
            const reader = new FileReader();
            if(e.target.files[0]) {
                reader.onload = () => document.getElementById('preview').src = reader.result;
                reader.readAsDataURL(e.target.files[0]);
            }
        }

        window.checkConductor = () => {
            document.getElementById('sectionConductor').style.display = document.getElementById('tipo').value === 'conductor' ? 'block' : 'none';
        }

        const registrar = async () => {
            const tel = document.getElementById('tel').value;
            const nombre = document.getElementById('nombre').value;
            const pass = document.getElementById('pass').value;
            const tipoUsuario = document.getElementById('tipo').value;

            if(tel.length !== 10) return alert("El teléfono debe ser de 10 dígitos");
            if(!nombre || !pass) return alert("Faltan datos obligatorios");

            try {
                const docRef = doc(db, "usuarios", tel);
                const snap = await getDoc(docRef);
                
                if(snap.exists()) return alert("Este número ya existe");

                await setDoc(docRef, {
                    nombre, 
                    tel, 
                    pass,
                    tipo: tipoUsuario,
                    sindicato: document.getElementById('sindicato').value || '',
                    unidad: document.getElementById('unidad').value || '',
                    deuda: 0,
                    estado: "activo",
                    fecha: new Date().toISOString()
                });

                localStorage.setItem('usuarioActivo', tel);
                localStorage.setItem('nombreActivo', nombre);
                localStorage.setItem('tipoUsuario', tipoUsuario);
                
                if (tipoUsuario === "conductor") {
                    window.location.assign("menu_chofer.html");
                } else {
                    window.location.assign("Menu_Principal.html");
                }

            } catch (error) {
                console.error("Error al registrar:", error);
                alert("Hubo un problema con la base de datos.");
            }
        }

        document.getElementById('btnRegistrar').addEventListener('click', registrar);
    </script>
</body>
</html>
