<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Pasajero | MotoTaxi</title>
    <link rel="stylesheet" href="css/menu_P.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://via.placeholder.com/80" id="side-img-perfil">
            <h3 id="side-nombre-usuario">Usuario Premium</h3>
        </div>
        <div class="sidebar-content">
            <div class="menu-item"><i class="fas fa-history"></i> Mis Viajes</div>
            <div class="menu-item"><i class="fas fa-wallet"></i> Métodos de Pago</div>
            <div class="menu-item"><i class="fas fa-star"></i> Favoritos</div>
            <div class="menu-item"><i class="fas fa-headset"></i> Soporte Técnico</div>
        </div>
        <div class="sidebar-footer">
            <div class="menu-item btn-logout" onclick="cerrarSesion()">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </div>
        </div>
    </div>

    <div class="mapa-fondo" id="map"></div>

    <div class="header-app">
        <i class="fas fa-bars icon-menu" onclick="abrirMenu()"></i>
        <span class="app-title">MOTOTAXI PREMIUM</span>
        <img src="https://via.placeholder.com/40" class="user-photo" id="img-perfil">
    </div>

    <div class="search-box">
        <i class="fas fa-search icon-search"></i>
        <input type="text" id="destino-txt" placeholder="¿A dónde vamos hoy en Peto?">
    </div>

    <div class="sheet-servicios">
        <div class="grid-servicios">
            <div class="card-v active" onclick="setServicio('estandar', this)">
                <i class="fas fa-motorcycle"></i>
                <span>BÁSICO</span>
                <p>IVA 10%</p>
            </div>
            <div class="card-v" onclick="setServicio('rapido', this)">
                <i class="fas fa-bolt"></i>
                <span>ESTÁNDAR</span>
                <p>IVA 20%</p>
            </div>
            <div class="card-v" onclick="setServicio('carga', this)">
                <i class="fas fa-box"></i>
                <span>PRO</span>
                <p>IVA 30%</p>
            </div>
        </div>
        <button class="btn-solicitar" onclick="abrirFlujo()">SOLICITAR AHORA</button>
    </div>

    <div class="overlay" id="overlay" onclick="cerrarTodo()"></div>

    <div class="capa-pregunta" id="capa1">
        <h2 class="titulo-capa">¿Cuántos son?</h2>
        <div class="container-inputs">
            <div class="input-group">
                <label>Adultos</label>
                <input type="number" id="p-adultos" value="1" min="1" class="input-contador" onchange="actualizarYCalcular()">
            </div>
            <div class="input-group">
                <label>Niños</label>
                <input type="number" id="p-ninos" value="0" min="0" class="input-contador" onchange="actualizarYCalcular()">
            </div>
        </div>
        <button class="btn-solicitar" onclick="siguienteCapa(2)">SIGUIENTE</button>
    </div>

    <div class="capa-pregunta" id="capa2">
        <h2 class="titulo-capa">¿Con cuánto pagas?</h2>
        <div class="grid-pagos">
            <button class="btn-pago" onclick="setPago('Exacto', this)">Pago Exacto</button>
            <button class="btn-pago" onclick="setPago(20, this)">$20.00</button>
            <button class="btn-pago" onclick="setPago(50, this)">$50.00</button>
            <button class="btn-pago" onclick="setPago(100, this)">$100.00</button>
        </div>
        <div id="resumen-total" class="display-total">Total: $0.00</div>
        <button class="btn-solicitar" onclick="enviarAFirebase()">CONFIRMAR VIAJE</button>
    </div>

    <script type="module">
        import { calcularTarifa } from './js/motor_precios.js';

        let pedido = { servicio: 'estandar', adultos: 1, ninos: 0, pago: '', total: 0 };

        // --- FUNCIONES GLOBALES ---
        
        window.abrirMenu = function() {
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        };

        window.cerrarTodo = function() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('capa1').classList.remove('active');
            document.getElementById('capa2').classList.remove('active');
        };

        window.abrirFlujo = function() {
            const destino = document.getElementById('destino-txt').value;
            if(!destino) return alert("❌ Escribe un destino.");
            document.getElementById('overlay').classList.add('active');
            document.getElementById('capa1').classList.add('active');
            window.actualizarYCalcular();
        };

        window.siguienteCapa = function(n) {
            document.getElementById('capa1').classList.remove('active');
            document.getElementById('capa2').classList.add('active');
        };

        window.setServicio = function(tipo, el) {
            pedido.servicio = tipo;
            document.querySelectorAll('.card-v').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            window.actualizarYCalcular();
        };

        window.actualizarYCalcular = function() {
            pedido.adultos = parseInt(document.getElementById('p-adultos').value) || 1;
            pedido.ninos = parseInt(document.getElementById('p-ninos').value) || 0;
            pedido.total = calcularTarifa(pedido.adultos, pedido.ninos, pedido.servicio);
            document.getElementById('resumen-total').innerText = `Total: $${pedido.total}.00`;
        };

        window.setPago = function(valor, el) {
            pedido.pago = valor;
            document.querySelectorAll('.btn-pago').forEach(b => b.style.borderColor = '#333');
            el.style.borderColor = '#ffb703';
        };

        window.enviarAFirebase = function() {
            if(!pedido.pago) return alert("⚠️ Selecciona con cuánto vas a pagar.");
            alert("🚀 Enviando pedido...");
        };

        window.cerrarSesion = function() {
            if(confirm("¿Cerrar sesión?")) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        };
    </script>
</body>
</html>
