<style>
    .alerta-viaje { background: #ffb703; color: black; padding: 20px; border-radius: 20px; margin-top: 20px; display: none; }
    .btn-aceptar { background: #000; color: white; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; }
</style>

<div class="card-chofer">
    <div id="status-bar" style="background: #2b9348; padding: 5px; border-radius: 10px; margin-bottom: 10px;">EN LÍNEA</div>
    <h2 id="unidad-txt">Unidad #--</h2>
    
    <div id="tarjeta-viaje" class="alerta-viaje">
        <p>🔔 <b>¡NUEVO VIAJE!</b></p>
        <h3 id="viaje-destino">Destino: Centro</h3>
        <p id="viaje-detalle">2 Personas - Paga con $100</p>
        <div style="font-size: 24px; font-weight: bold;">Ganas: <span id="viaje-monto">$0</span></div>
        <button class="btn-aceptar" onclick="aceptarViaje()">ACEPTAR (15s)</button>
    </div>

    <hr color="#333">
    <div class="reloj" id="display-reloj">00:00</div>
    <button class="btn-parada" onclick="controlarParada()">INICIAR PARADA</button>
</div>

<script type="module">
    import { db, collection, onSnapshot, query, where } from './js/config.js';

    // Escuchar viajes en tiempo real
    const q = query(collection(db, "viajes_pendientes"), where("estado", "==", "buscando"));
    onSnapshot(q, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
                const viaje = change.doc.data();
                document.getElementById('viaje-destino').innerText = viaje.destino;
                document.getElementById('viaje-monto').innerText = "$" + (viaje.total - 3); // Le resta la comisión de la app
                document.getElementById('tarjeta-viaje').style.display = 'block';
                // Sonar claxon (opcional)
                new Audio('claxon.mp3').play();
            }
        });
    });
</script>
